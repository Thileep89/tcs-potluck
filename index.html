<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TCS Prudential Potluck 🍽️</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
  --text: #f0ede8; --text2: #9a9690; --text3: #5a5754;
  --accent: #e8c97a; --accent-dim: rgba(232,201,122,0.12);
  --green: #7ec87e; --green-dim: rgba(126,200,126,0.12);
  --blue: #7ab8e8; --blue-dim: rgba(122,184,232,0.12);
  --coral: #e89a7a; --coral-dim: rgba(232,154,122,0.12);
  --lavender: #b07ae8; --lavender-dim: rgba(176,122,232,0.12);
  --rose: #e87aaa; --rose-dim: rgba(232,122,170,0.12);
  --teal: #7ae8d4; --teal-dim: rgba(122,232,212,0.12);
  --radius: 12px; --radius-sm: 8px;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

.hero { background: var(--surface); border-bottom: 1px solid var(--border); padding: 2.5rem 1.5rem 2rem; text-align: center; }
.pill { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-dim); border: 1px solid rgba(232,201,122,0.25); border-radius: 999px; padding: 4px 14px; font-size: 12px; color: var(--accent); font-weight: 500; margin-bottom: 14px; letter-spacing: 0.03em; }
.hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(26px, 5vw, 40px); font-weight: 600; color: var(--text); letter-spacing: -0.02em; line-height: 1.15; }
.hero h1 span { color: var(--accent); }
.hero p { font-size: 15px; color: var(--text2); margin-top: 8px; max-width: 400px; margin-left: auto; margin-right: auto; line-height: 1.6; }
.live-bar { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 14px; font-size: 12px; color: var(--text3); }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

.main { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
.stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 500; color: var(--text); }
.stat-value.accent { color: var(--accent); }

/* Add form */
.add-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.5rem; }
.add-card-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-grid input, .form-grid select {
  height: 40px; border: 1px solid var(--border2); border-radius: var(--radius-sm);
  padding: 0 12px; font-size: 14px; background: var(--surface2); color: var(--text);
  width: 100%; font-family: 'DM Sans', sans-serif; transition: border-color 0.15s;
}
.form-grid input::placeholder { color: var(--text3); }
.form-grid input:focus, .form-grid select:focus { outline: none; border-color: rgba(232,201,122,0.4); }
.form-grid select option { background: #222; }
.form-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
.err { font-size: 12px; color: var(--coral); display: none; }
.add-btn {
  height: 40px; padding: 0 20px; border-radius: var(--radius-sm);
  border: 1px solid rgba(232,201,122,0.35); background: var(--accent-dim);
  color: var(--accent); font-size: 14px; font-weight: 500; cursor: pointer;
  font-family: 'DM Sans', sans-serif; transition: all 0.15s; display: flex; align-items: center; gap: 6px;
}
.add-btn:hover { background: rgba(232,201,122,0.2); border-color: rgba(232,201,122,0.6); }
.add-btn:active { transform: scale(0.97); }
.add-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* List */
.list-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; padding: 0 2px; }
.entry {
  display: grid; grid-template-columns: 28px 1fr 1fr 110px 36px;
  gap: 10px; align-items: center;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 11px 14px; margin-bottom: 8px;
  animation: fadeIn 0.25s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
.entry-num { font-size: 12px; color: var(--text3); font-weight: 500; }
.entry-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.entry-food { font-size: 14px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.badge { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 999px; font-weight: 500; white-space: nowrap; }
.del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 15px; padding: 4px 6px; border-radius: 6px; transition: all 0.15s; line-height: 1; }
.del:hover { color: var(--coral); background: var(--coral-dim); }

.empty { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 14px; border: 1px dashed var(--border2); border-radius: var(--radius); }
.empty-icon { font-size: 36px; margin-bottom: 10px; }

/* Loading */
.loading { text-align: center; padding: 2rem; color: var(--text3); font-size: 14px; }

/* Badges */
.b-appetizer { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(122,184,232,0.2); }
.b-main      { background: var(--green-dim); color: var(--green); border: 1px solid rgba(126,200,126,0.2); }
.b-sides     { background: var(--lavender-dim); color: var(--lavender); border: 1px solid rgba(176,122,232,0.2); }
.b-dessert   { background: var(--rose-dim); color: var(--rose); border: 1px solid rgba(232,122,170,0.2); }
.b-snacks    { background: var(--coral-dim); color: var(--coral); border: 1px solid rgba(232,154,122,0.2); }
.b-drinks    { background: var(--teal-dim); color: var(--teal); border: 1px solid rgba(122,232,212,0.2); }

@media (max-width: 500px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .form-grid { grid-template-columns: 1fr; }
  .entry { grid-template-columns: 22px 1fr 36px; }
  .entry-food, .entry-cat { display: none; }
}
</style>
</head>
<body>

<div class="hero">
  <div class="pill">📍 TCS Prudential, NJ</div>
  <h1>Potluck <span>Sign-up</span> Sheet</h1>
  <p>Add your name and what you're bringing. Updates live for everyone!</p>
  <div class="live-bar">
    <div class="live-dot"></div>
    <span id="live-status">Connecting…</span>
  </div>
</div>

<div class="main">
  <div class="stats">
    <div class="stat"><div class="stat-label">Friends</div><div class="stat-value accent" id="s-total">—</div></div>
    <div class="stat"><div class="stat-label">Mains</div><div class="stat-value" id="s-mains">—</div></div>
    <div class="stat"><div class="stat-label">Desserts</div><div class="stat-value" id="s-desserts">—</div></div>
    <div class="stat"><div class="stat-label">Drinks</div><div class="stat-value" id="s-drinks">—</div></div>
  </div>

  <div class="add-card">
    <div class="add-card-title">✦ Add your entry</div>
    <div class="form-grid">
      <input type="text" id="inp-name" placeholder="Your name" maxlength="40" />
      <input type="text" id="inp-food" placeholder="What are you bringing?" maxlength="60" />
      <select id="inp-cat">
        <option value="">Pick category…</option>
        <option value="appetizer">Appetizer</option>
        <option value="main">Main dish</option>
        <option value="sides">Sides</option>
        <option value="dessert">Dessert</option>
        <option value="snacks">Snacks</option>
        <option value="drinks">Drinks</option>
      </select>
      <button class="add-btn" id="add-btn" onclick="addEntry()">＋ Add to list</button>
    </div>
    <div class="form-footer">
      <span class="err" id="err-msg">Please fill in all three fields.</span>
    </div>
  </div>

  <div class="list-label" id="list-label">Loading entries…</div>
  <div id="list-container"><div class="loading">Connecting to database…</div></div>
</div>

<!-- Firebase v9 compat (CDN) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ─── FIREBASE CONFIG ───────────────────────────────────────────────────────
// Replace these values with your own Firebase project config
const firebaseConfig = {
  apiKey: "AIzaSyAW8qCYuj368-XCrcZBknzRFLcz-anQpU0",
  authDomain: "tcs-potluck-may-30.firebaseapp.com",
  databaseURL: "https://tcs-potluck-may-30-default-rtdb.firebaseio.com",
  projectId: "tcs-potluck-may-30",
  storageBucket: "tcs-potluck-may-30.firebasestorage.app",
  messagingSenderId: "776739888379",
  appId: "1:776739888379:web:c8290f96db5f964bfc245e"
};
// ───────────────────────────────────────────────────────────────────────────

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ref = db.ref('potluck_entries');

const catLabels = {
  appetizer: 'Appetizer', main: 'Main dish', sides: 'Sides',
  dessert: 'Dessert', snacks: 'Snacks', drinks: 'Drinks'
};

// Live listener
ref.on('value', (snap) => {
  const data = snap.val() || {};
  const entries = Object.entries(data).map(([k, v]) => ({ key: k, ...v }));
  entries.sort((a, b) => a.ts - b.ts);
  renderList(entries);
  updateStats(entries);
  document.getElementById('live-status').textContent = 'Live — updates instantly for everyone';
}, (err) => {
  document.getElementById('live-status').textContent = 'Connection error';
  console.error(err);
});

function renderList(entries) {
  const c = document.getElementById('list-container');
  document.getElementById('list-label').textContent =
    entries.length === 0 ? '' : `${entries.length} friend${entries.length !== 1 ? 's' : ''} signed up`;

  if (entries.length === 0) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">🍱</div>No entries yet — be the first to add!</div>`;
    return;
  }

  c.innerHTML = entries.map((e, i) => `
    <div class="entry">
      <span class="entry-num">${i + 1}</span>
      <span class="entry-name">${esc(e.name)}</span>
      <span class="entry-food">${esc(e.food)}</span>
      <span class="entry-cat"><span class="badge b-${e.cat}">${catLabels[e.cat] || e.cat}</span></span>
      <button class="del" onclick="deleteEntry('${e.key}')" title="Remove">✕</button>
    </div>`).join('');
}

function updateStats(entries) {
  document.getElementById('s-total').textContent = entries.length;
  document.getElementById('s-mains').textContent = entries.filter(e => e.cat === 'main').length;
  document.getElementById('s-desserts').textContent = entries.filter(e => e.cat === 'dessert').length;
  document.getElementById('s-drinks').textContent = entries.filter(e => e.cat === 'drinks').length;
}

async function addEntry() {
  const name = document.getElementById('inp-name').value.trim();
  const food = document.getElementById('inp-food').value.trim();
  const cat  = document.getElementById('inp-cat').value;
  const err  = document.getElementById('err-msg');

  if (!name || !food || !cat) { err.style.display = 'block'; return; }
  err.style.display = 'none';

  const btn = document.getElementById('add-btn');
  btn.disabled = true;
  btn.textContent = 'Adding…';

  try {
    await ref.push({ name, food, cat, ts: Date.now() });
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-food').value = '';
    document.getElementById('inp-cat').value = '';
  } catch(e) {
    alert('Could not save. Check your Firebase config.');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = '＋ Add to list';
  }
}

function deleteEntry(key) {
  if (confirm('Remove this entry?')) ref.child(key).remove();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('inp-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inp-food').focus();
});
document.getElementById('inp-food').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inp-cat').focus();
});
</script>
</body>
</html>
